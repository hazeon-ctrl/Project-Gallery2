<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Emanation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }
        #gameContainer {
            text-align: center;
        }
        canvas {
            border: 2px solid #4a4a6a;
            background: linear-gradient(to bottom, #0d0d2d, #05051a);
            box-shadow: 0 0 20px rgba(100, 100, 200, 0.3);
        }
        #ui {
            margin-top: 20px;
            font-size: 18px;
        }
        #windIndicator {
            margin: 10px 0;
            font-size: 16px;
            color: #8af;
        }
        #instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="600" height="700"></canvas>
    <div id="ui">
        <div>Stars Captured: <span id="score">0</span></div>
        <div id="windIndicator">Wind: →</div>
    </div>
    <div id="instructions">
        Use ← → arrow keys or A/D to move<br>
        Guide emanations to wane the moon, then catch the falling star!
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const windEl = document.getElementById('windIndicator');

    let player = {
        x: canvas.width / 2,
        y: canvas.height - 80,
        width: 40,
        height: 40,
        speed: 5
    };

    let moon = {
        x: canvas.width / 2,
        y: 50,
        radius: 30,
        health: 100,
        maxHealth: 100
    };

    let star = null;

    let emanations = [];
    let particles = [];
    let wind = { x: 0, y: 0 };
    let windAngle = -0.1;
    let score = 0;
    let keys = {};

    function updateWind() {
        windAngle += 0.015;
        wind.x = Math.sin(windAngle) * 1.2;
        wind.y = -0.5;

        const windDir = wind.x > 0.5 ? '→→→' : wind.x < -0.5 ? '←←←' : wind.x > 0 ? '→' : '←';
        windEl.textContent = `Wind: ${windDir}`;
    }

    function createEmanation() {
        emanations.push({
            x: player.x + player.width / 2,
            y: player.y,
            vx: Math.random() * 0.2 - 0.1,
            vy: -2.5,
            life: 302,
            size: 8
        });
    }

    function createParticles(x, y, count, color = [255, 220, 150]) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 100,
                size: 3,
                color: color
            });
        }
    }

    function checkMoonCollision(em) {
        const dx = em.x - moon.x;
        const dy = em.y - moon.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return dist < moon.radius + em.size;
    }

    function checkStarCollision() {
        if (!star) return false;
        const dx = star.x - (player.x + player.width / 2);
        const dy = star.y - (player.y + player.height / 2);
        const dist = Math.sqrt(dx * dx + dy * dy);
        return dist < star.radius + player.width / 2;
    }

    function spawnStar() {
        star = {
            x: moon.x,
            y: moon.y,
            vx: 0,
            vy: 0.5,
            radius: 15,
            rotation: 0,
            twinkle: 0
        };
    }

    function drawPlayer() {
        ctx.save();
        ctx.translate(player.x + player.width / 2, player.y + player.height / 2);

        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, player.width);
        gradient.addColorStop(0, 'rgba(100, 200, 255, 0.4)');
        gradient.addColorStop(1, 'rgba(100, 200, 255, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(-player.width, -player.height, player.width * 2, player.height * 2);

        ctx.fillStyle = '#6cf';
        ctx.beginPath();
        ctx.arc(0, 0, player.width / 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function drawMoon() {
        ctx.save();
        ctx.translate(moon.x, moon.y);

        const moonPhase = moon.health / moon.maxHealth;
        const pulse = Math.sin(Date.now() * 0.003) * 0.2 + 0.8;

        // Moon glow
        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, moon.radius * 1.8);
        gradient.addColorStop(0, `rgba(255, 255, 220, ${pulse * 0.3 * moonPhase})`);
        gradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, moon.radius * 1.8, 0, Math.PI * 2);
        ctx.fill();

        // Full moon body
        ctx.fillStyle = `rgba(255, 255, 230, ${moonPhase})`;
        ctx.beginPath();
        ctx.arc(0, 0, moon.radius, 0, Math.PI * 2);
        ctx.fill();

        // Waning shadow (right side darkens as moon wanes)
        if (moonPhase < 1) {
            ctx.fillStyle = `rgba(15, 15, 35, ${1 - moonPhase})`;
            ctx.beginPath();
            const waneAmount = (1 - moonPhase) * moon.radius * 2;
            ctx.arc(waneAmount - moon.radius, 0, moon.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
    }

    function drawStar() {
        if (!star) return;

        ctx.save();
        ctx.translate(star.x, star.y);
        ctx.rotate(star.rotation);

        star.twinkle = Math.sin(Date.now() * 0.01) * 0.3 + 0.7;

        // Star glow
        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, star.radius * 3);
        gradient.addColorStop(0, `rgba(255, 255, 150, ${star.twinkle * 0.6})`);
        gradient.addColorStop(1, 'rgba(255, 255, 100, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, star.radius * 3, 0, Math.PI * 2);
        ctx.fill();

        // Draw 5-pointed star
        ctx.fillStyle = `rgba(255, 255, 200, ${star.twinkle})`;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
            const x = Math.cos(angle) * star.radius;
            const y = Math.sin(angle) * star.radius;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        // Inner star
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
            const x = Math.cos(angle) * star.radius * 0.4;
            const y = Math.sin(angle) * star.radius * 0.4;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }

    function drawEmanations() {
        emanations.forEach(em => {
            ctx.save();
            const alpha = em.life / 255;

            const gradient = ctx.createRadialGradient(em.x, em.y, 0, em.x, em.y, em.size * 2);
            gradient.addColorStop(0, `rgba(150, 220, 255, ${alpha * 0.6})`);
            gradient.addColorStop(1, `rgba(150, 220, 255, 0)`);
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(em.x, em.y, em.size * 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = `rgba(200, 240, 255, ${alpha})`;
            ctx.beginPath();
            ctx.arc(em.x, em.y, em.size, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        });
    }

    function drawParticles() {
        particles.forEach(p => {
            const alpha = p.life / 100;
            ctx.fillStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function update() {
        if (keys['ArrowLeft'] || keys['a']) {
            player.x = Math.max(0, player.x - player.speed);
        }
        if (keys['ArrowRight'] || keys['d']) {
            player.x = Math.min(canvas.width - player.width, player.x + player.speed);
        }

        updateWind();

        // Only create emanations if moon hasn't fully waned
        if (moon.health > 0 && Math.random() < 0.2) {
            createEmanation();
        }

        // Update emanations
        for (let i = emanations.length - 1; i >= 0; i--) {
            const em = emanations[i];
            em.vx += wind.x * 0.1;
            em.vy += wind.y * 0.05;
            em.x += em.vx;
            em.y += em.vy;
            em.life -= 2;

            if (moon.health > 0 && checkMoonCollision(em)) {
                moon.health = Math.max(0, moon.health - 5);
                createParticles(em.x, em.y, 6, [200, 240, 255]);
                emanations.splice(i, 1);

                // Spawn star when moon is fully waned
                if (moon.health === 0 && !star) {
                    spawnStar();
                }
                continue;
            }

            if (em.life <= 0 || em.y < 0 || em.x < 0 || em.x > canvas.width) {
                emanations.splice(i, 1);
            }
        }

        // Update star
        if (star) {
            star.y += star.vy;
            star.vy += 0.02; // Gentle acceleration
            star.rotation += 0.05;

            if (checkStarCollision()) {
                score++;
                scoreEl.textContent = score;
                createParticles(star.x, star.y, 20, [255, 255, 150]);
                star = null;
                moon.health = moon.maxHealth; // Reset moon
            } else if (star.y > canvas.height + 50) {
                // Star fell off screen, reset moon anyway
                star = null;
                moon.health = moon.maxHealth;
            }
        }

        // Update particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 3;
            p.vx *= 0.98;
            p.vy *= 0.98;

            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }
    }

    function draw() {
        ctx.fillStyle = 'rgba(5, 5, 26, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawMoon();
        drawStar();
        drawEmanations();
        drawParticles();
        drawPlayer();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    document.addEventListener('keydown', e => {
        keys[e.key] = true;
    });

    document.addEventListener('keyup', e => {
        keys[e.key] = false;
    });

    gameLoop();
</script>
</body>
</html>
